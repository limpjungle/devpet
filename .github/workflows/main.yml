name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COMPOSE_FILE: docker-compose.yml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install linter
        run: pip install ruff

      - name: Run ruff check
        run: ruff check app/

      - name: Run ruff format check
        run: ruff format --check app/

  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Flask app image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
          load: true
          tags: devpet-app:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image starts correctly
        run: |
          docker run -d --name test-app -p 8000:8000 devpet-app:ci
          sleep 5
          curl -sf http://localhost:8000/ || (docker logs test-app && exit 1)
          docker stop test-app && docker rm test-app

      - name: Build full compose stack
        run: docker compose build

      - name: Start compose stack
        run: |
          docker compose up -d
          sleep 15

      - name: Health checks
        run: |
          echo "Checking Flask API..."
          curl -sf http://localhost:8000/ || exit 1
          echo "Checking Nginx..."
          curl -sf http://localhost:80/ || exit 1
          echo "Checking Prometheus..."
          curl -sf http://localhost:9090/-/healthy || exit 1
          echo "Checking Grafana..."
          curl -sf http://localhost:3000/api/health || exit 1

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  docker-hub:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devpet-app
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
